<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 500px;
            border-collapse: collapse;
        }
        caption{
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }
        th,td{
            border: 1px solid black;
            padding: 8px;
        }

        th{
            background-color: lightgray;
            font-style: italic;
        }

        .destaque{
            background-color: bisque;
        }

        .idade{
            background-color: aquamarine;
        }

    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>
    <table>
        <colgroup>
            <col class="destaque">
            <col class="destaque">
            <col class="idade">
            <col class="destaque ">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Carlos Eduardo</td>
            <td>M</td>
            <td>32</td>
            <td>Engenheiro Civil</td>
        </tr>
        <tr>
            <td>Beatriz Oliveira</td>
            <td>F</td>
            <td>28</td>
            <td>Designer Gráfico</td>
        </tr>
        <tr>
            <td>Ricardo Santos</td>
            <td>M</td>
            <td>45</td>
            <td>Gerente de Vendas</td>
        </tr>
        <tr>
            <td>Juliana Costa</td>
            <td>F</td>
            <td>22</td>
            <td>Desenvolvedora Software</td>
        </tr>
        <tr>
            <td>Fernando Lima</td>
            <td>M</td>
            <td>37</td>
            <td>Professor</td>
        </tr>
    </table>
</body>
</html>
