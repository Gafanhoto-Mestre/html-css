<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <style>
        fieldset{
            background-color: aquamarine;
            width: 250px;
            font-family: Arial, Helvetica, sans-serif;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.582);           
        }

        legend{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-weight: 600;
            font-style: italic;
            text-shadow: 2px 2px 2px rgba(0, 0, 0, 0.301);
            text-align: left;    
        }

        input.botao{
            background-color: aquamarine;
            color: blue;
            border-radius: 10px;
        }

        .botao:hover{
            background-color: rgb(255, 141, 47);
            transition: 0.5s;
            
        }

    </style>
</head>
<body>
    <h1>Exemplo de formulários</h1>
    <form action="cadastro.html" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="iemail">Email: </label>
                <input type="email" name="email" id="imail" placeholder="email@exemplo.com" autocomplete="email">
            </p>
            <p>
                <label for="itel">Tel.: </label>
                <input type="tel" name="tel" id="itel" pattern="^\(\d{2}\)\d{4,5}-\d{4}$" required>
                <!-- pattern
                        "^$" = começa com ^ e termina com $;
                        \( = o contra barra antes significa para escrever oque vier na frente;
                        \d{2} = escrever a quantidade de dígitos dentro das chaves;
                        \d{4,7} = escrever de 4 a 7 dígitos;
                -->
            </p>
            <!-- Estudar mais sobre RegEx (expressões regulares) -->
        </fieldset>
        <p>
            <input type="submit" class="botao" id="ienv" value="Enviar">
            <input type="reset" class="botao" id="ilim" value="Limpar">
        </p>
    </form>
</body>
</html>
