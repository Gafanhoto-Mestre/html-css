<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox e Radio button</title>  
</head>
<body>
    <h1>Exemplo de Formulario</h1>
    <form action="cadastro.html" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>

            <input type="radio" name="sexo" id="isxfem" value="Feminino"> <label for="isxfem">Feminino</label> <br>

            <input type="radio" name="sexo" id="isxmas" value="Masculino"> <label for="isxmas">Masculino</label> <br>

            <input type="radio" name="sexo" id="iviado" value="viado"> <label for="iviado">Viado</label>
        </fieldset>

        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esbas" id="iesbas" value="basquete"> <label for="iesbas">Basquete</label> <br>
            <input type="checkbox" name="esfut" id="iesfut" value="futebol"> <label for="iesfut">Futebol</label> <br>
            <input type="checkbox" name="esnat" id="iesnat" value="natação"> <label for="iesnat">Natação</label> <br>
            <input type="checkbox" name="esten" id="iesten" value="tênis"> <label for="iesten">Tênis</label>
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
