<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teste de Formulário</h1>

    <!-- ATRIBUTOS DA ENTRY (campo) 
        
        input:password - Para campos de senha
        requered - Para tornar o campo obrigatório
        minlength e maxlength - Para limitar a quantidade de caracteres
        size - Configura quantos caracteres serão mostrados na caixa
        placeholder - Texto de funto
        autocomplete - Ligar ou desligar o preenchimento automático

        autocomplete (dentro da entry) - Configura a qual campo se refere (várias opções)
    
    
    -->

    <form action="" method="POST" autocomplete="on">
        <p>
            <label for="iusu">Nome: </label>
            <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" size="10" placeholder="Digite seu nome" autocomplete="username">
        </p>
        <p>
            <label for="isen">Senha: </label>
            <input type="password" name="sen" id="isen" required minlength="8" maxlength="20"
            size="8" placeholder="senha" autocomplete="current-password">  
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
