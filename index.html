<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <!-- Elementos number, month, date e time em formulários -->
</head>
<body>
    <h1>Teste de formulários</h1>
    <form action="cadastro.html" method="POST" autocomplete="on">
        <p>
            <!-- input:text-->
            <label for="inome">Nome: </label>
            <input type="text" name="nome" id="inome" required maxlength="15" placeholder="Digite seu nome" autocomplete="name">
        </p>
        <p>
            <!-- input:number -->
            <label for="imedia">Média: </label>
            <input type="number" name="media" id="imedia" value="5" max="10" step="0.1">
        </p>
        <p>
            <!-- input:date  / calendário normal -->
            <!-- input:month / calendário de mês -->
            <label for="ical">Calendário</label>
            <input type="date" name="cal" id="ical" value="2026-04-11">
        </p>
        <p>
            <!-- input:time / Hor -->
            <label for="ihora">Horário</label>
            <input type="time" name="hora" id="ihora">
        </p>
        <p>
            <label for="icpf">CPF</label>
            <input 
            type="text" 
            name="cpf" 
            id="icpf" 
            placeholder="000.000.000-00"
            inputmode="numeric" 
            maxlength="14"
            pattern="\d{3}\.?\d{3}\.?\d{3}-?\d{2}"
            title="Digite o CPF no formato 000.000.000-00"
            required
            >
        </p>
        <p>
            <!-- input:submit / Enviar -->
            <!-- input:reset / Limpar -->
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
